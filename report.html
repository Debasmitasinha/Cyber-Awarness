<!DOCTYPE html>
<html>
<head>
  <title>Report Fraud</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="report-page">

<div class="report-wrapper">

  <div class="report-card">

    <h4 id="report-title" class="text-center mb-3">Report Fraud</h4>

    <input id="type" class="form-control mb-3" placeholder="Fraud Type">
    <input id="amount" type="number" class="form-control mb-3" placeholder="Amount Lost">
    <textarea id="desc" class="form-control mb-3" placeholder="Description"></textarea>

    <button class="btn btn-danger w-100" onclick="submitReport()" id="report-btn">
      Submit
    </button>

  </div>

</div>

<script src="app.js"></script>
</body>

<script src="app.js"></script>
</body>
</html>
