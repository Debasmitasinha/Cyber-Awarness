<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="quiz-page">

<div class="container mt-5">

  <div class="quiz-card mx-auto">

    <h4 class="text-center mb-4">Cyber Safety Quiz</h4>

    <div id="quizContainer">

      <!-- Q1 -->
      <!-- Q1 -->
<div class="quiz-q">
  <p>1. Should you share OTP?</p>
  <div class="options">
    <div onclick="select(this,'q1','Yes')" class="option">Yes</div>
    <div onclick="select(this,'q1','No')" class="option">No</div>
  </div>
</div>

<!-- Q2 -->
<div class="quiz-q">
  <p>2. Is clicking unknown links safe?</p>
  <div class="options">
    <div onclick="select(this,'q2','Yes')" class="option">Yes</div>
    <div onclick="select(this,'q2','No')" class="option">No</div>
  </div>
</div>

<!-- Q3 -->
<div class="quiz-q">
  <p>3. Should you verify website URL?</p>
  <div class="options">
    <div onclick="select(this,'q3','Yes')" class="option">Yes</div>
    <div onclick="select(this,'q3','No')" class="option">No</div>
  </div>
</div>

<!-- Q4 -->
<div class="quiz-q">
  <p>4. Do banks ask for passwords?</p>
  <div class="options">
    <div onclick="select(this,'q4','Yes')" class="option">Yes</div>
    <div onclick="select(this,'q4','No')" class="option">No</div>
  </div>
</div>

<!-- Q5 -->
<div class="quiz-q">
  <p>5. Should you approve unknown UPI requests?</p>
  <div class="options">
    <div onclick="select(this,'q5','Yes')" class="option">Yes</div>
    <div onclick="select(this,'q5','No')" class="option">No</div>
  </div>
</div>

      <!-- SUBMIT -->
      <button class="btn btn-primary mt-4 w-100" onclick="submitQuiz()">Submit</button>

    </div>

  </div>

</div>

<!-- RESULT MODAL -->
<div id="resultModal" class="result-modal">
  <div class="result-box">
    <h4>Your Score</h4>

    <p id="scoreText"></p>

    <!-- ✅ RESULTS INSIDE MODAL -->
    <div id="resultDetails" class="mt-3 text-start"></div>

    <button type="button" class="btn btn-success mt-3 w-100" onclick="closeModal()">OK</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
