<!DOCTYPE html>
<html>
<head>
  <title>Phishing Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="phishing-page">

<div class="container mt-5">

  <div class="phishing-card mx-auto">

    <h4 class="text-center mb-3">Phishing Simulation</h4>

    <div id="scenario-box" class="alert text-center"></div>

    <div class="text-center mt-3">
      <button class="btn btn-success m-2" onclick="answer('safe')">Safe</button>
      <button class="btn btn-danger m-2" onclick="answer('phishing')">Phishing</button>
    </div>

    <div id="explanation" class="mt-4"></div>

    <div class="text-center mt-3">
      <button id="nextBtn" class="btn btn-primary" onclick="nextScenario()" style="display:none;">
        Next
      </button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>

<script src="app.js"></script>
</body>
</html>
